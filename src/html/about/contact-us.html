<section class="contact-us pt_40 pb_40">
    <div class="contact-us__container container">
        <div class="contact-us__media contact-us__media-mirror">
            <img class="contact-us__img" src="@img/contact-us.png">
        </div>
        <div class="contact-us__panel">
            <div class="contact-us__head">
                <div class="contact-us__subtitle text_14 text_title">СЕРВИС И СОПРОВОЖДЕНИЕ</div>
                <h2 class="contact-us__title text_24 text_title">консультация</h2>
                <div class="contact-us__text text_14">Ответим на любые вопросы, оценим состояние украшений, дадим рекомендации по уходу и ремонту. В центре Москвы. <br>  Свяжитесь с нами — мы рядом</div>
            </div>
            <form class="contact-us__form" action="#">
                <div class="contact-us__form-inner">
                    <div class="contact-us__fields">
                        <label class="input-field">
                            <input class="input-field__input input text_14" type="text" name="name" placeholder="Ваше имя *">
                            <div class="input-field__error text_14">Поле необходимо заполнить</div>
                        </label>
                        <label class="input-field">
                            <input class="input-field__input input text_14" type="tel" name="phone" placeholder="Номер телефона *">
                            <div class="input-field__error text_14">Поле необходимо заполнить</div>
                        </label>
                        <label class="input-field">
                            <input class="input-field__input input text_14" type="email" name="email" placeholder="Email *">
                            <div class="input-field__error text_14"></div>
                        </label>
                    </div>
                    <label class="checkbox-field">
                        <div class="checkbox checkbox-field__checkbox">
                            <input type="checkbox" class="checkbox__input" name="policy">
                            <div class="checkbox__fake">
                                <img src="@img/icons/check.svg" alt="" class="checkbox__icon">
                            </div>
                        </div>
                        <div class="checkbox-field__content">
                            <div class="checkbox-field__text text_14">
                                Я даю своё согласие на <a href="#">обработку персональных данных</a> и принимаю условия <a class="contact-us__policy-link" href="#">политики конфиденциальности</a>
                            </div>
                            <div class="checkbox-field__error text_14">Поле необходимо заполнить</div>
                        </div>
                    </label>
                </div>
                <button class="contact-us__btn text_14 btn btn_dark" type="submit">Отправить заявку</button>
            </form>
        </div>
    </div>
</section>
