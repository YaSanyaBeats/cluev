<section class="pb_40 news-xl">
    <div href="#" class="container news-xl__container">
        <div class="news-xl__content boutique__content-right">
            <div class="boutique__logo-dark">
                <img class="" src="images/icons/logo.svg" uk-svg>
            </div>
            <div class="text_20 text_title text_upper boutique__town">Москва</div>

<div id="callback-modal" uk-modal>
    <div class="uk-modal-dialog uk-modal-body uk-margin-auto-vertical">
        <button class="uk-modal-close-default" type="button" uk-close></button>

        <div class="uk-modal__logo">
            <img src="images/icons/logo-key.svg" alt="" uk-svg>
        </div>

        <form class="contact-us__form" action="#">
            <div class="contact-us__form-inner">
                <div class="contact-us__fields">
                    <label class="input-field">
                        <input class="text_14 input input-field__input" type="text" name="name" placeholder="Ваше имя *">
                        <div class="text_14 input-field__error">Поле необходимо заполнить</div>
                    </label>
                    <label class="input-field">
                        <input class="text_14 input input-field__input" type="tel" name="phone" placeholder="Номер телефона *">
                        <div class="text_14 input-field__error">Поле необходимо заполнить</div>
                    </label>
                </div>
                <label class="checkbox-field">
                    <div class="checkbox checkbox-field__checkbox">
                        <input type="checkbox" class="checkbox__input" name="policy">
                        <div class="checkbox__fake">
                            <img src="images/icons/check.svg" alt="" class="checkbox__icon">
                        </div>
                    </div>
                    <div class="checkbox-field__content">
                        <div class="text_14 checkbox-field__text">
                            Я даю своё согласие на <a href="#">обработку персональных данных</a> и принимаю условия <a class="contact-us__policy-link" href="#">политики конфиденциальности</a>
                        </div>
                        <div class="text_14 checkbox-field__error">Поле необходимо заполнить</div>
                    </div>
                </label>
            </div>
            <a href="#" class="text_14 btn btn_dark contact-us__btn" type="submit" uk-toggle="" role="button">заказать звонок</a>
        </form>
    </div>
</div>
