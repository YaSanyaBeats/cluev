<section class="poem pt_40 pb_40">
    <div class="poem__container container">
        <div class="poem__bg">
            <div class="poem__content">
                <div class="poem__text text_24 text_title">
                    В степной глуши,<br>над влагой молчаливой,<br>
                    Где круглые раскинулись листы,<br>
                    Любуюсь я давно,<br>пловец пугливый,<br>
                    На яркие плавучие цветы.
                </div>
                <div class="poem__footer">
                    <div class="poem__author text_14">А. Фет, 1887 г.</div>
                    <img class="poem__sign" src="@img/poem-sign.png">
                </div>
            </div>
            <div class="poem__media">
                <img class="poem__img" src="@img/poem.jpg">
            </div>
        </div>
    </div>
</section>
