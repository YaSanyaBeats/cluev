<section class="heading pt_@@pt pb_@@pb">
    <div class="heading__container container">
        @@if (context.subtitle) {
            <div class="heading__subtitle text_14 text_title">@@subtitle</div>
        }
        @@if (context.title) {
            <h2 class="heading__title text_24 text_title">@@title</h2>
        }
        @@if (context.text) {
            <div class="heading__text text_14">@@text</div>
        }
    </div>
</section>
